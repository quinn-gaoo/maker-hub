name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/www/wwwroot/maker-hub' }}

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          key_file="$RUNNER_TEMP/deploy_key"
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > "$key_file"
          chmod 600 "$key_file"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: ${{ runner.temp }}/deploy_key
          passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          port: ${{ env.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            DEPLOY_BRANCH=main sh backend/scripts/deploy_backend.sh
