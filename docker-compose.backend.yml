name: makerhub-backend

services:
  backend:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    container_name: makerhub-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      UV_SYSTEM_CERTS: "1"
      UV_LINK_MODE: copy
      UV_DEFAULT_INDEX: https://pypi.tuna.tsinghua.edu.cn/simple
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/makerhub}
    command: sh scripts/docker-entrypoint.sh
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - backend_uv_cache:/root/.cache/uv
    networks:
      - makerhub
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  makerhub:
    external: true
    name: makerhub_network

volumes:
  backend_venv:
  backend_uv_cache:
